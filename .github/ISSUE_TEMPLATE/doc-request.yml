name: Documentation Request
description: Request a library's documentation to be added to the marketplace
title: "[docs] "
labels: ["doc-request"]
body:
  - type: markdown
    attributes:
      value: |
        Request a library's documentation to be indexed and added as a pre-built plugin.
        Once added, anyone can install it with `claude /plugin install docs-<library>@knowledge`.

  - type: input
    id: library
    attributes:
      label: Library name
      description: Short identifier for the library (e.g., `laravel`, `react`, `sqlc`)
      placeholder: e.g., laravel
    validations:
      required: true

  - type: input
    id: docs_url
    attributes:
      label: Documentation URL
      description: Root URL of the documentation site to index
      placeholder: e.g., https://laravel.com/docs/12.x/
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version (optional)
      description: Documentation version if applicable. Leave blank for latest.
      placeholder: e.g., 12

  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      description: Any extra context — specific sections to prioritize, known issues with the docs site, etc.
